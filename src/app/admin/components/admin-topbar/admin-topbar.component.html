<header class="sticky top-0 z-10 border-b border-border bg-white">
  <div class="flex h-20 items-center justify-between px-4 lg:px-8">
    <div class="lg:hidden">
      <app-logo />
    </div>

    <div class="hidden md:block">
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">
        Admin console
      </p>
      <p class="mt-1 text-sm text-slate-500">
        Review users, signals, and moderation activity.
      </p>
    </div>

    <div class="flex items-center gap-4">
      <button
        type="button"
        class="relative flex h-11 w-11 items-center justify-center rounded-2xl transition hover:bg-slate-100"
      >
        <lucide-icon [img]="BellIcon" [size]="20"></lucide-icon>
        <span class="absolute right-3 top-3 h-2.5 w-2.5 rounded-full bg-primary"></span>
      </button>

      <div class="flex items-center gap-3 border-l border-border pl-4">
        <img
          [src]="avatarUrl"
          [alt]="displayName"
          class="h-11 w-11 rounded-full object-cover"
        />
        <div class="hidden text-left sm:block">
          <p class="text-sm font-semibold text-foreground">{{ displayName }}</p>
          <p class="text-xs text-slate-500">{{ roleLabel }}</p>
        </div>
      </div>
    </div>
  </div>
</header>
