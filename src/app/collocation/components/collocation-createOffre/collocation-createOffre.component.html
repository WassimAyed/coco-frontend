<style>
  .offer-form {
  max-width: 500px;
  margin: 2rem auto;
  padding: 2rem;
  border: 1px solid #ddd;
  border-radius: 10px;
  background-color: #f9f9f9;
  font-family: Arial, sans-serif;
}

.offer-form h2 {
  text-align: center;
  margin-bottom: 1.5rem;
  color: #333;
}

.form-group {
  margin-bottom: 1rem;
  display: flex;
  flex-direction: column;
}

.form-group label {
  margin-bottom: 0.5rem;
  font-weight: bold;
  color: #555;
}

.form-group input,
.form-group textarea {
  padding: 0.5rem;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 1rem;
  transition: border 0.2s;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: #007bff;
  outline: none;
}

.checkbox-group {
  flex-direction: row;
  align-items: center;
}

.checkbox-group input[type="checkbox"] {
  margin-right: 0.5rem;
  transform: scale(1.2);
}

button {
  width: 100%;
  padding: 0.7rem;
  background-color: #007bff;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.2s;
}

button:disabled {
  background-color: #a0c4ff;
  cursor: not-allowed;
}

button:hover:not(:disabled) {
  background-color: #0056b3;
}

.error-message {
  color: #ff4d4f;
  margin-bottom: 1rem;
  font-weight: bold;
}

.success-message {
  color: #28a745;
  margin-bottom: 1rem;
  font-weight: bold;
}

</style>

<form [formGroup]="offerForm" (ngSubmit)="submit()" enctype="multipart/form-data" class="offer-form">
  <h2>Create Collocation Offer</h2>

  <div class="form-group">
    <label>Title</label>
    <input formControlName="titre" placeholder="Enter title" />
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea formControlName="description" placeholder="Enter description"></textarea>
  </div>

  <div class="form-group">
    <label>Price</label>
    <input type="number" formControlName="prixLoc" placeholder="Enter price" />
  </div>

  <div class="form-group">
    <label>Location</label>
    <input formControlName="ville" placeholder="Enter city" />
  </div>

  <div class="form-group">
    <label>Chambres</label>
    <input type="number" formControlName="chambres" placeholder="Number of rooms" />
  </div>

  <div class="form-group checkbox-group">
    <input type="checkbox" formControlName="meublee" />
    <label>Meublee</label>
  </div>

  <div class="form-group">
    <label>Images</label>
    <input type="file" (change)="onFileChange($event)" multiple />
  </div>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

  <button type="submit" [disabled]="submitting">Submit</button>
</form>
