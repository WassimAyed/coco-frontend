<!-- Backdrop -->
<div class="modal-backdrop-custom" (click)="close()"></div>

<!-- Modal -->
<div class="modal-custom" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-custom__dialog">

    <!-- Header -->
    <div class="modal-custom__header">
      <h5 class="modal-custom__title" id="modalTitle">
        <i class="fas fa-paper-plane me-2 text-success"></i>
        Envoyer une demande
      </h5>
      <button class="modal-custom__close" (click)="close()" aria-label="Fermer">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-custom__body">

      <div *ngIf="error" class="alert alert-danger d-flex align-items-center mb-3">
        <i class="fas fa-exclamation-circle me-2"></i>
        {{ error }}
      </div>

      <div class="form-group">
        <label class="form-label fw-semibold mb-1">
          Votre message <span class="text-danger">*</span>
        </label>
        <textarea
          class="form-control"
          rows="5"
          [(ngModel)]="message"
          placeholder="Présentez-vous et expliquez votre intérêt pour cette offre..."
          [disabled]="loading">
        </textarea>
        <div class="form-text text-muted mt-1">
          <i class="fas fa-info-circle me-1"></i>
          {{ message.length }} / 500 caractères
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-custom__footer">
      <button
        class="btn btn-secondary"
        (click)="close()"
        [disabled]="loading">
        Annuler
      </button>
      <button
        class="btn btn-success d-flex align-items-center gap-2"
        (click)="submit()"
        [disabled]="loading || !message.trim()">
        <span
          *ngIf="loading"
          class="spinner-border spinner-border-sm"
          role="status">
        </span>
        <i *ngIf="!loading" class="fas fa-paper-plane"></i>
        {{ loading ? 'Envoi...' : 'Envoyer' }}
      </button>
    </div>

  </div>
</div>
