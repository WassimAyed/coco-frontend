<div class="page">
  <div class="header">
    <div>
      <h1>
        <lucide-angular [img]="Bell" [size]="22" color="#8B0000" style="vertical-align:middle;margin-right:0.4rem"></lucide-angular>
        Notifications
      </h1>
      <p>{{ unreadCount }} non lue(s)</p>
    </div>
    <div class="header-actions">
      <button (click)="markAllAsRead()" class="btn-read-all" [disabled]="unreadCount === 0">
        <lucide-angular [img]="Check" [size]="14"></lucide-angular> Tout marquer lu
      </button>
      <a routerLink="/real-estate/furniture" class="btn-back">← Retour</a>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Chargement...</div>

  <div *ngIf="!loading && notifications.length > 0" class="notifications-list">
    <div *ngFor="let n of notifications"
      class="notification-card"
      [class.unread]="!n.isRead">

      <div class="notif-icon" [ngClass]="getTypeClass(n.type)">
        <lucide-angular [img]="getTypeIcon(n.type)" [size]="20"></lucide-angular>
      </div>

      <div class="notif-body">
        <p class="notif-message">{{ n.message | replace:'€':' DT' | replace:'$':' DT' }}</p>
        <p class="notif-meta">
          📅 {{ n.createdAt | date:'dd/MM/yyyy HH:mm' }}
          <span *ngIf="!n.isRead" class="badge-unread">Nouveau</span>
        </p>
      </div>

      <div class="notif-actions">
        <button *ngIf="!n.isRead" (click)="markAsRead(n.id)" class="btn-mark">
          <lucide-angular [img]="Eye" [size]="14"></lucide-angular> Lu
        </button>
        <a *ngIf="n.furnitureId" [routerLink]="['/real-estate/furniture', n.furnitureId]" class="btn-view">Voir</a>
        <button (click)="delete(n.id)" class="btn-delete">
          <lucide-angular [img]="Trash2" [size]="14"></lucide-angular>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && notifications.length === 0" class="empty">
    <div class="empty-icon">
      <lucide-angular [img]="Bell" [size]="40" color="#ccc"></lucide-angular>
    </div>
    <p>Aucune notification pour le moment.</p>
  </div>
</div>
