<aside class="surface-card p-5">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-lg font-bold text-foreground">Search and filters</p>
      <p class="mt-1 text-sm leading-6 text-muted-foreground">
        Narrow services by need, category, and delivery style.
      </p>
    </div>
    <button type="button" class="text-sm font-semibold text-primary" (click)="reset()">
      Reset
    </button>
  </div>

  <div class="mt-5 space-y-5" [formGroup]="filtersForm">
    <div>
      <label class="mb-2 block text-sm font-semibold text-secondary-foreground">Search</label>
      <input class="form-input" formControlName="search" placeholder="Search title, tag, provider..." />
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-secondary-foreground">Category</label>
      <select class="form-input" formControlName="categoryId">
        <option value="all">All categories</option>
        @for (category of categories; track category.id) {
          <option [value]="category.id">{{ category.label }}</option>
        }
      </select>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-secondary-foreground">Delivery mode</label>
      <select class="form-input" formControlName="deliveryMode">
        <option value="all">Any mode</option>
        <option value="online">Online</option>
        <option value="on-site">On-site</option>
        <option value="hybrid">Hybrid</option>
      </select>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-secondary-foreground">Minimum rating</label>
      <select class="form-input" formControlName="minRating">
        <option [value]="0">Any rating</option>
        <option [value]="4">4.0+</option>
        <option [value]="4.5">4.5+</option>
        <option [value]="4.8">4.8+</option>
      </select>
    </div>

    <label class="flex items-center justify-between rounded-[1.25rem] border border-border bg-white px-4 py-4">
      <span>
        <span class="block text-sm font-semibold text-foreground">Featured only</span>
        <span class="mt-1 block text-sm text-muted-foreground">Show highlighted services first.</span>
      </span>
      <input type="checkbox" class="h-5 w-5 rounded border-border text-primary" formControlName="featuredOnly" />
    </label>
  </div>
</aside>
