<div class="surface-card mx-auto w-full max-w-lg p-8 text-center">
  <h1 class="text-3xl font-black text-foreground">Google Sign-In</h1>

  @if (errorMessage()) {
    <div class="mt-6 rounded-2xl border border-destructive/20 bg-destructive/5 px-4 py-3 text-sm text-destructive">
      {{ errorMessage() }}
    </div>
    <div class="mt-8">
      <a routerLink="/login" class="btn-primary">Back to login</a>
    </div>
  } @else {
    <div class="mt-8 rounded-[1.75rem] border border-border bg-secondary/70 px-6 py-8">
      <app-loading size="7rem" label="Connecting Google" caption="Finalizing your secure session..." />
    </div>
  }
</div>
