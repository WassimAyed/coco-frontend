<div class="min-h-screen bg-gray-50 py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="mb-8">
      <div class="flex justify-between items-center">
        <h1 class="text-4xl font-bold text-foreground">My Items</h1>
        <button (click)="createNewItem()" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-primary/90">
          Post New Item
        </button>
      </div>
      <button (click)="backToList()" class="mt-2 text-primary hover:text-primary/80">
        ← Back to All Items
      </button>
    </div>

    <!-- Alerts -->
    <div *ngIf="error" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700">
      {{ error }}
    </div>
    <div *ngIf="successMessage" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg text-green-700">
      {{ successMessage }}
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
      <p class="mt-4 text-gray-600">Loading your items...</p>
    </div>

    <!-- Items Table/Grid -->
    <div *ngIf="!loading" class="bg-white rounded-lg shadow-md overflow-hidden">
      <!-- Empty State -->
      <div *ngIf="items.length === 0" class="p-12 text-center">
        <p class="text-gray-600 text-lg mb-4">You haven't posted any items yet</p>
        <button (click)="createNewItem()" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-primary/90">
          Post Your First Item
        </button>
      </div>

      <!-- Items List -->
      <div *ngIf="items.length > 0" class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let item of items" class="hover:bg-gray-50">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-foreground">{{ item.title }}</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span [class]="item.type === 'LOST' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'" class="px-3 py-1 rounded-full text-xs font-semibold">
                  {{ item.type }}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ item.category }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ item.location }}</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span [class]="item.status === 'ACTIVE' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'" class="px-3 py-1 rounded-full text-xs font-semibold">
                  {{ item.status }}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ item.dateTime | date: 'short' }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                <button (click)="viewItem(item)" class="text-primary hover:text-primary/80">View</button>
                <button *ngIf="item.status === 'ACTIVE'" (click)="editItem(item)" class="text-blue-600 hover:text-blue-800">Edit</button>
                <button *ngIf="item.status === 'ACTIVE'" (click)="markAsResolved(item)" class="text-green-600 hover:text-green-800">Resolved</button>
                <button (click)="deleteItem(item)" class="text-red-600 hover:text-red-800">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
